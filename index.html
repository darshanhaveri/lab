<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admissions Portal</title>
</head>
<body>

    <header>
        <h1>College of Higher Education</h1>
        <nav>
            <a href="#">Home</a> | 
            <a href="#">Academics</a> | 
            <a href="#">Admissions</a> | 
            <a href="#">Contact Us</a>
        </nav>
        <hr>
    </header>

    <main>
        <h3>New Admissions: 2026 Academic Year</h3>
        <p>Please fill out the form below to register as a new student.</p>

        <div>
            <h2>Student Registration Form</h2>
            
            <form action="#" method="POST" enctype="multipart/form-data">
                
                <div>
                    <label for="name">Student Name:</label><br>
                    <input type="text" id="name" name="name" placeholder="Enter full name" required>
                </div>
                <br>

                <div>
                    <label for="regno">Registration Number:</label><br>
                    <input type="text" id="regno" name="regno" placeholder="Enter registration number" required>
                </div>
                <br>

                <div>
                    <label for="email">Email Address:</label><br>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <br>

                <div>
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <br>

                <div>
                    <label for="dob">Date of Birth:</label><br>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <br>

                <div>
                    <label>Gender:</label><br>
                    <input type="radio" id="male" name="gender" value="Male" required>
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender" value="Other">
                    <label for="other">Other</label>
                </div>
                <br>

                <div>
                    <label for="course">Course:</label><br>
                    <select id="course" name="course" required>
                        <option value="" disabled selected>Select your course</option>
                        <option value="MCA">Master of Computer Applications (MCA)</option>
                        <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                        <option value="BTech">B.Tech / B.E.</option>
                        <option value="CyberSec">M.Sc Cybersecurity</option>
                    </select>
                </div>
                <br>

                <div>
                    <label for="photo">Upload Student Photo:</label><br>
                    <input type="file" id="photo" name="photo" accept="image/*" required>
                </div>
                <br>

                <div>
                    <label>Skills:</label><br>
                    <input type="checkbox" id="python" name="skills" value="Python">
                    <label for="python">Python</label>

                    <input type="checkbox" id="java" name="skills" value="Java">
                    <label for="java">Java</label>

                    <input type="checkbox" id="networking" name="skills" value="Networking">
                    <label for="networking">Networking</label>

                    <input type="checkbox" id="dbms" name="skills" value="DBMS">
                    <label for="dbms">DBMS</label>
                </div>
                <br>

                <div>
                    <label for="address">Address:</label><br>
                    <textarea id="address" name="address" rows="4" cols="30" placeholder="Enter permanent address" required></textarea>
                </div>
                <br>

                <div>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </div>
            </form>
            <br>
            <a href="https://www.example.edu" target="_blank">Visit College Website</a>
        </div>
        </main>

    <footer>
        <hr>
        <p>&copy; 2026 College of Higher Education. All Rights Reserved.</p>
    </footer>

</body>
    </html>
