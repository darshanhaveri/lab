<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code & Answer Display</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e; /* Dark theme background */
            color: #cccccc;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            color: #ffffff;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        /* Styling for the raw code container */
        .code-container {
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            height: 400px; /* Fixed height to enable scrolling */
            overflow-y: auto; /* Scrollbar for the 100 lines */
            overflow-x: auto;
            margin-bottom: 30px;
        }
        pre {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #9cdcfe; /* VS Code light blue variable color */
        }
        /* Styling for the answer container */
        .answer-container {
            background-color: #252526;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            font-size: 16px;
            color: #ce9178; /* VS Code string color */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Raw Code Display</h2>
        <div class="code-container">
            <pre><code id="raw-code-block"></code></pre>
        </div>

        <h2>Answer</h2>
        <div class="answer-container" id="answer-block">
            </div>
    </div>

    <script>
        // 1. Generate 100 lines of raw code
        const codeBlock = document.getElementById('raw-code-block');
        let codeContent = '';
        
        for (let i = 1; i <= 100; i++) {
            // Modify this string to represent the actual code you want to print
            codeContent += `Line ${i.toString().padStart(3, '0')}: function executeTask_${i}() { return "Task ${i} complete"; }\n`;
        }
        
        // Inject the generated code into the HTML
        codeBlock.textContent = codeContent;

        // 2. Output the answer
        const answerBlock = document.getElementById('answer-block');
        answerBlock.textContent = "System Output: All 100 functions compiled successfully. Ready for execution.";
    </script>

</body>
</html>
