
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Registration</title>
</head>
<body>

    <h2>College Admission Form</h2>

    <form action="/submit_form" method="POST">
        
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required autofocus maxlength="50">
        <br><br>

        <fieldset>
            <legend>Year of Study:</legend>
            <input type="radio" id="freshman" name="studyYear" value="freshman" required>
            <label for="freshman">Freshman</label><br>
            
            <input type="radio" id="sophomore" name="studyYear" value="sophomore">
            <label for="sophomore">Sophomore</label><br>
            
            <input type="radio" id="junior" name="studyYear" value="junior">
            <label for="junior">Junior</label><br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Extracurricular Interests:</legend>
            <input type="checkbox" id="sports" name="interests" value="sports">
            <label for="sports">Athletics</label><br>
            
            <input type="checkbox" id="arts" name="interests" value="arts">
            <label for="arts">Fine Arts</label><br>
            
            <input type="checkbox" id="astronomy_club" name="interests" value="astronomy" checked>
            <label for="astronomy_club">Astronomy Club</label><br>
        </fieldset>
        <br>

        <label for="major">Select Major:</label>
        <select id="major" name="major" required>
            <option value="" disabled selected>Select your major...</option>
            <option value="computer_science">Computer Science</option>
            <option value="engineering">Engineering</option>
            <option value="astrophysics">Astrophysics</option>
            <option value="business">Business</option>
        </select>
        <br><br>

        <label for="campus">Preferred Campus Building:</label>
        <input list="buildings" id="campus" name="campus" placeholder="Type or select a building...">
        <datalist id="buildings">
            <option value="North Hall">
            <option value="Science Center">
            <option value="Main Library">
            <option value="Observatory">
        </datalist>
        <br><br>

        <button type="submit">Submit Application</button>
        <button type="reset">Clear Form</button>

    </form>

</body>
</html>
